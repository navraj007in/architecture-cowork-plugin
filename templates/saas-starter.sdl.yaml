sdlVersion: "1.1"

solution:
  name: "MySaaS"
  description: "Multi-tenant SaaS with auth, billing, and dashboard"
  stage: "mvp"

architecture:
  style: "modular-monolith"
  projects:
    frontend:
      - name: "dashboard"
        framework: "nextjs"
        rendering: "ssr"
        styling: "tailwind"
    backend:
      - name: "api"
        framework: "nodejs"
        apiStyle: "rest"
        orm: "prisma"

data:
  primaryDatabase:
    type: "postgres"
    hosting: "managed"
